<html lang="fr">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue Dynamique | Expérience Épurée</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-secondary: #fbfbfb;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-gradient: linear-gradient(135deg, #444444 0%, #111111 100%);
            --gray-light: #f0f0f0;
            --gray-medium: #e0e0e0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* --- ACCÈS SÉCURISÉ --- */
        #access-gate {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: var(--transition);
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .login-card input {
            width: 100%;
            padding: 12px 20px;
            margin: 1.5rem 0;
            border: 1px solid var(--gray-medium);
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
        }

        .login-card input:focus {
            border-color: #000;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        /* --- HEADER --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-light);
        }

        .logo {
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 1.4rem;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-primary);
            position: relative;
            transition: var(--transition);
        }

        .btn-icon:hover {
            opacity: 0.6;
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -8px;
            background: #000;
            color: #fff;
            font-size: 0.6rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- MAIN CONTENT --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 5%;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--gray-light);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .product-image-container {
            width: 100%;
            height: 300px;
            background: var(--bg-secondary);
            overflow: hidden;
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .add-to-cart-btn {
            background: var(--gray-light);
            color: var(--text-primary);
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-to-cart-btn:hover {
            background: var(--accent-gradient);
            color: white;
        }

        /* --- RECHERCHE MODALE --- */
        .search-modal {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            padding-top: 10vh;
            transition: var(--transition);
        }

        .search-modal.active {
            display: flex;
        }

        .search-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .search-input-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 15px 50px;
            font-size: 1.2rem;
            border: none;
            border-bottom: 2px solid #000;
            background: transparent;
            outline: none;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .close-search {
            position: absolute;
            right: 5%;
            top: 30px;
            font-size: 2rem;
            cursor: pointer;
        }

        .search-results-panel {
            max-height: 50vh;
            overflow-y: auto;
            text-align: left;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 10px;
        }

        .result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
            border-bottom: 1px solid var(--gray-light);
        }

        .result-item:hover {
            background: white;
            padding-left: 30px;
        }

        /* --- DETAIL MODAL --- */
        .detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.1);
            z-index: 2100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .detail-modal.active {
            display: flex;
        }

        .detail-card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            position: relative;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        .detail-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- PANIER SIDEBAR --- */
        #cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            z-index: 1500;
            box-shadow: -10px 0 50px rgba(0,0,0,0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        #cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 2rem;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray-light);
        }

        .cart-footer {
            padding: 2rem;
            background: var(--bg-secondary);
        }

        .whatsapp-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-medium);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .btn-whatsapp {
            width: 100%;
            padding: 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .product-image-container { height: 180px; }
            .container { padding: 1.5rem 4%; }
        }

        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <!-- ÉCRAN D'ACCÈS -->
    <div id="access-gate">
        <div class="login-card">
            <h2 style="font-weight: 800;">CATALOGUE STOCK</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Authentification requise</p>
            <input type="password" id="access-key" placeholder="Clé d'accès">
            <button onclick="verifyAccess()">Entrer</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; display: none;">Clé invalide</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" style="display: none;">
        <header>
            <div class="logo">CATALOGUE<span>.</span></div>
            <div class="header-actions">
                <button class="btn-icon" onclick="openSearch()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="btn-icon" onclick="toggleCart()">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </header>

        <main class="container">
            <div class="product-grid" id="product-grid">
                <!-- Injecté par JS -->
            </div>
        </main>
    </div>

    <!-- MODALE RECHERCHE -->
    <div class="search-modal" id="search-modal">
        <div class="close-search" onclick="closeSearch()">&times;</div>
        <div class="search-container">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="Quel produit cherchez-vous ?" oninput="handleSearch()">
            </div>
            <div class="search-results-panel" id="search-results">
                <!-- Liste des noms de produits -->
            </div>
        </div>
    </div>

    <!-- MODALE DETAIL -->
    <div class="detail-modal" id="detail-modal">
        <div id="detail-container"></div>
    </div>

    <!-- SIDEBAR PANIER -->
    <div id="cart-sidebar">
        <div class="cart-header">
            <h3>Votre Panier</h3>
            <i class="fa-solid fa-times" onclick="toggleCart()" style="cursor:pointer;"></i>
        </div>
        <div class="cart-content" id="cart-items"></div>
        <div class="cart-footer">
            <input type="text" class="whatsapp-input" id="whatsapp-num" placeholder="Numéro WhatsApp (ex: +237...)" value="+237">
            <button class="btn-whatsapp" onclick="sendToWhatsApp()">COMMANDER SUR WHATSAPP</button>
        </div>
    </div>

        let cart = [];

        // --- AUTHENTIFICATION ---
        function verifyAccess() {
            const key = document.getElementById('access-key').value;
            // Remplacez '1234' par votre clé réelle ou gardez la logique de votre fichier original
            if (key === '1234') { 
                document.getElementById('access-gate').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('access-gate').style.display = "none";
                    document.getElementById('app-content').style.display = "block";
                    renderProducts(products);
                }, 400);
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        }

        // --- RENDU PRODUITS ---
        function renderProducts(data) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${p.image}" alt="${p.id}" onerror="this.src='https://placehold.co/400x400?text=Image+Indisponible'">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.id}</div>
                        <button class="add-to-cart-btn" onclick="addToCart('${p.id}')">
                            <i class="fa-solid fa-plus"></i> Ajouter au panier
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- RECHERCHE ---
        function openSearch() {
            document.getElementById('search-modal').classList.add('active');
            document.getElementById('search-input').focus();
            handleSearch(); // Afficher tout au début
        }

        function closeSearch() {
            document.getElementById('search-modal').classList.remove('active');
            document.getElementById('detail-modal').classList.remove('active');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const panel = document.getElementById('search-results');
            
            const filtered = products.filter(p => p.id.toLowerCase().includes(query));
            
            panel.innerHTML = filtered.map(p => `
                <div class="result-item" onclick="showDetail('${p.id}')">${p.id}</div>
            `).join('');
        }

        function showDetail(id) {
            const product = products.find(p => p.id === id);
            const container = document.getElementById('detail-container');
            
            container.innerHTML = `
                <div class="detail-card">
                    <div onclick="document.getElementById('detail-modal').classList.remove('active')" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:1.5rem;">&times;</div>
                    <img src="${product.image}" alt="${product.id}" onerror="this.src='https://placehold.co/400x400?text=Image+Indisponible'">
                    <h3 style="margin-bottom:10px;">${product.id}</h3>
                    <button class="add-to-cart-btn" style="width:100%; padding:15px; background:var(--accent-gradient); color:white;" onclick="addToCart('${product.id}')">
                        Ajouter au panier
                    </button>
                </div>
            `;
            document.getElementById('detail-modal').classList.add('active');
        }

        // --- PANIER ---
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function addToCart(name) {
            cart.push(name);
            updateCartUI();
            
            // Animation feedback
            const cartBtn = document.querySelector('.fa-bag-shopping');
            cartBtn.style.transform = "scale(1.3)";
            setTimeout(() => cartBtn.style.transform = "scale(1)", 200);
            
            // Si on ajoute depuis le détail, on ferme
            document.getElementById('detail-modal').classList.remove('active');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            
            if (cart.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:var(--text-secondary);'>Panier vide</p>";
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item}</span>
                    <i class="fa-solid fa-trash" style="color:#ff4d4d; cursor:pointer;" onclick="removeItem(${index})"></i>
                </div>
            `).join('');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // --- WHATSAPP ---
        function sendToWhatsApp() {
            if (cart.length === 0) return alert("Le panier est vide");
            
            const phone = document.getElementById('whatsapp-num').value.replace(/\s/g, '');
            let message = "Bonjour, voici ma commande :\n\n";
            cart.forEach((item, i) => message += `${i+1}. ${item}\n`);
            
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
